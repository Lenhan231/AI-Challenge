<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>May AI — Trò Chơi Tương Tác</title>
  <style>
    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --accent: #3b82f6;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --text: #f1f5f9;
      --muted: #94a3b8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    .container {
      max-width: 1024px;
      margin: 0 auto;
      padding: 20px;
    }

    .header {
      text-align: center;
      margin-bottom: 30px;
    }

    .header h1 {
      font-size: 32px;
      font-weight: bold;
      margin: 0 0 8px 0;
    }

    .header p {
      color: var(--muted);
      margin: 0;
    }

    .section {
      display: none;
      padding: 40px;
      background: var(--surface);
      border-radius: 12px;
      min-height: 400px;
      animation: fadeIn 0.3s ease;
    }

    .section.active {
      display: block;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Lobby */
    .lobby {
      text-align: center;
    }

    .lobby-form {
      display: flex;
      gap: 12px;
      margin-top: 20px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .lobby-form input {
      padding: 12px 16px;
      font-size: 16px;
      border: 1px solid var(--muted);
      border-radius: 8px;
      background: var(--bg);
      color: var(--text);
      min-width: 300px;
    }

    .lobby-form button {
      padding: 12px 24px;
      font-size: 16px;
      font-weight: bold;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .lobby-form button:hover {
      background: #2563eb;
    }

    .status {
      margin-top: 20px;
      padding: 12px;
      background: var(--bg);
      border-radius: 8px;
      color: var(--muted);
    }

    /* Writing Section */
    .writing {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .job-title-box {
      background: var(--bg);
      border: 2px solid var(--accent);
      border-radius: 8px;
      padding: 20px;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
      color: var(--accent);
    }

    .instruction {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 10px;
    }

    textarea {
      padding: 16px;
      font-size: 16px;
      border: 1px solid var(--muted);
      border-radius: 8px;
      background: var(--bg);
      color: var(--text);
      font-family: inherit;
      resize: vertical;
      min-height: 300px;
    }

    .submit-btn {
      padding: 12px 24px;
      font-size: 16px;
      font-weight: bold;
      background: var(--success);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .submit-btn:hover:not(:disabled) {
      background: #059669;
    }

    .submit-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Voting Section */
    .voting {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .card {
      background: var(--bg);
      border: 2px solid var(--accent);
      border-radius: 12px;
      padding: 30px;
      max-width: 700px;
      width: 100%;
      min-height: 350px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(20px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .card-text {
      flex: 1;
      font-size: 16px;
      line-height: 1.8;
      white-space: pre-wrap;
      overflow-y: auto;
      max-height: 500px;
      padding: 20px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 8px;
    }

    .card-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
    }

    .btn-hire,
    .btn-reject {
      padding: 12px 32px;
      font-size: 16px;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      flex: 1;
    }

    .btn-hire {
      background: var(--success);
      color: white;
    }

    .btn-hire:hover {
      background: #059669;
      transform: scale(1.05);
    }

    .btn-reject {
      background: var(--danger);
      color: white;
    }

    .btn-reject:hover {
      background: #dc2626;
      transform: scale(1.05);
    }

    .voting-waiting {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }

    .voting-waiting h2 {
      font-size: 24px;
      color: var(--text);
      margin-bottom: 10px;
    }

    .voting-waiting p {
      margin: 8px 0;
    }

    .pulse {
      display: inline-block;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .timer {
      text-align: center;
      font-size: 48px;
      font-weight: bold;
      margin: 20px 0;
      padding: 20px;
      background: var(--bg);
      border-radius: 12px;
      font-variant-numeric: tabular-nums;
      letter-spacing: 4px;
    }

    .timer.warning {
      color: var(--warning);
      animation: pulse 1s infinite;
    }

    .timer.danger {
      color: var(--danger);
      animation: pulse 0.5s infinite;
    }

    .timer.ok {
      color: var(--success);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🧵 May AI</h1>
      <p>Trò chơi tương tác: Con người vs AI</p>
    </div>

    <!-- Lobby -->
    <div class="section active" id="lobbySection">
      <h2>Chào mừng!</h2>
      <p>Nhập MSSV của bạn để bắt đầu:</p>
      <div class="lobby-form">
        <input type="text" id="mssvInput" placeholder="MSSV của bạn" maxlength="20">
        <button onclick="joinGame()">Tham gia</button>
      </div>
      <div class="status" id="lobbyStatus">Chờ...</div>
    </div>

    <!-- Voting Section -->
    <div class="section" id="votingSection">
      <div style="text-align: center; margin-bottom: 20px;">
        <div id="playerDisplay" style="color: var(--muted); font-size: 14px;"></div>
        <div class="timer" id="votingTimer">10:00</div>
      </div>
      <div id="votingContent"></div>
    </div>
  </div>

  <script>
    // Generate new playerId each session (don't persist in localStorage)
    // This prevents cross-tab MSSV collision
    let playerId = crypto.randomUUID();

    let playerMSSV = sessionStorage.getItem("playerMSSV") || "";
    let gameState = { phase: "lobby" };
    let hasJoined = !!playerMSSV;

    const API_BASE = "/api";
    const VOTING_TIME = 600; // 10 minutes
    let votingTimeLeft = VOTING_TIME;
    let votingTimerInterval = null;

    async function joinGame() {
      const mssvInput = document.getElementById("mssvInput");
      playerMSSV = mssvInput.value.trim();

      if (!playerMSSV) {
        alert("Vui lòng nhập MSSV của bạn");
        return;
      }

      try {
        const res = await fetch(`${API_BASE}/join`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ playerId, name: playerMSSV }),
        });

        if (res.ok) {
          sessionStorage.setItem("playerMSSV", playerMSSV);
          hasJoined = true;
          mssvInput.disabled = true;
          document.querySelector(".lobby-form button").disabled = true;
          document.getElementById("lobbyStatus").textContent = `✅ Đã tham gia. MSSV: ${playerMSSV}`;
          showVoting();
        } else {
          alert("Lỗi tham gia game");
        }
      } catch (err) {
        alert(`Lỗi: ${err.message}`);
      }
    }

    function startVotingTimer() {
      votingTimeLeft = VOTING_TIME;

      if (votingTimerInterval) clearInterval(votingTimerInterval);

      votingTimerInterval = setInterval(() => {
        votingTimeLeft--;
        const mins = Math.floor(votingTimeLeft / 60);
        const secs = votingTimeLeft % 60;
        const display = `${mins.toString().padStart(2, "0")}:${secs.toString().padStart(2, "0")}`;
        document.getElementById("votingTimer").textContent = display;

        const timer = document.getElementById("votingTimer");
        if (votingTimeLeft <= 60) {
          timer.className = "timer danger";
        } else if (votingTimeLeft <= 180) {
          timer.className = "timer warning";
        } else {
          timer.className = "timer ok";
        }

        if (votingTimeLeft <= 0) {
          clearInterval(votingTimerInterval);
          document.getElementById("votingContent").innerHTML = `
            <div class="voting-waiting">
              <h2>⏰ Hết giờ vote!</h2>
              <p class="pulse">✅ Cảm ơn bạn đã hoàn thành!</p>
            </div>
          `;
        }
      }, 1000);
    }

    function stopVotingTimer() {
      if (votingTimerInterval) {
        clearInterval(votingTimerInterval);
        votingTimerInterval = null;
      }
    }


    function showVoting() {
      document.getElementById("playerDisplay").textContent = `MSSV: ${playerMSSV}`;
      showSection("votingSection");
      startVotingTimer();
      loadNextCard();
    }

    async function loadNextCard() {
      try {
        const res = await fetch(`${API_BASE}/vote?playerId=${playerId}`);
        const data = await res.json();

        // Handle API errors
        if (!res.ok) {
          console.error("API error:", data);
          setTimeout(loadNextCard, 1000); // Retry
          return;
        }

        if (data.done) {
          document.getElementById("votingContent").innerHTML = `
            <div class="voting-waiting">
              <h2>✅ Bạn đã xong!</h2>
              <p class="pulse">⏳ Chờ mọi người hoàn thành vote...</p>
              <p style="margin-top: 20px; color: var(--muted); font-size: 14px;">
                Host sẽ chiếu kết quả trên màn hình lớn
              </p>
            </div>
          `;
          // Poll every 2s to see if new resumes available
          setTimeout(checkForMoreResumes, 2000);
          return;
        }

        if (!data.text || !data.resumeId) {
          console.error("Invalid response:", data);
          setTimeout(loadNextCard, 1000); // Retry
          return;
        }

        const resumeId = data.resumeId;
        const cardHtml = `
          <div class="card">
            <div class="card-text">${data.text}</div>
            <div class="card-actions">
              <button class="btn-hire" onclick="vote('${resumeId}', 'hire')">✅ Nhận</button>
              <button class="btn-reject" onclick="vote('${resumeId}', 'reject')">❌ Từ chối</button>
            </div>
          </div>
        `;
        document.getElementById("votingContent").innerHTML = cardHtml;
      } catch (err) {
        console.error("Load card error:", err);
        setTimeout(loadNextCard, 1000); // Retry on error
      }
    }

    async function checkForMoreResumes() {
      try {
        const res = await fetch(`${API_BASE}/vote?playerId=${playerId}`);
        const data = await res.json();

        if (!data.done) {
          loadNextCard();
        } else {
          setTimeout(checkForMoreResumes, 2000);
        }
      } catch (err) {
        console.error("Check error:", err);
      }
    }

    async function vote(resumeId, decision) {
      // Disable buttons to prevent double-click
      const buttons = document.querySelectorAll(".btn-hire, .btn-reject");
      buttons.forEach(btn => btn.disabled = true);

      try {
        const res = await fetch(`${API_BASE}/vote`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ playerId, resumeId, decision }),
        });

        if (res.ok) {
          await loadNextCard();
        } else {
          const errorData = await res.json();
          console.error("Vote error:", errorData);
          alert(`Lỗi vote: ${errorData.error || "unknown"}`);
          // Re-enable buttons on error
          buttons.forEach(btn => btn.disabled = false);
        }
      } catch (err) {
        console.error("Vote exception:", err);
        alert(`Lỗi: ${err.message}`);
        // Re-enable buttons on error
        buttons.forEach(btn => btn.disabled = false);
      }
    }

    function showSection(sectionId) {
      document.querySelectorAll(".section").forEach((s) => {
        s.classList.remove("active");
      });
      document.getElementById(sectionId).classList.add("active");
    }

    let currentPhase = "writing";

    async function pollPhase() {
      try {
        const res = await fetch(`${API_BASE}/phase`);
        const data = await res.json();
        if (data.phase && data.phase !== currentPhase) {
          currentPhase = data.phase;
          // Host changed phase
          if (currentPhase === "voting" && hasJoined && !resumeSubmitted) {
            // Redirect to voting if still writing
            showVoting();
          }
        }
      } catch (err) {
        // Ignore poll errors
      }
    }

    // Initialize
    window.addEventListener("load", () => {
      if (!hasJoined) {
        showSection("lobbySection");
      } else {
        // Already joined in previous session
        showWriting();
      }
      // Poll phase every 1.5 seconds
      setInterval(pollPhase, 1500);
    });
  </script>
</body>
</html>
