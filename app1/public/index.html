<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resume Battle — Viết CV</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1a2a4a 100%);
      color: #f1f5f9;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 40px;
    }

    .logo {
      font-size: 48px;
      margin-bottom: 12px;
    }

    .header h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #f59e0b 0%, #3b82f6 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header p {
      color: #94a3b8;
      font-size: 14px;
    }

    /* Sections */
    .section {
      display: none;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .section.active {
      display: block;
      opacity: 1;
    }

    /* Lobby */
    .lobby {
      background: rgba(30, 41, 59, 0.6);
      -webkit-backdrop-filter: blur(10px);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(59, 130, 246, 0.2);
      border-radius: 16px;
      padding: 40px;
      text-align: center;
    }

    .lobby h2 {
      font-size: 24px;
      margin-bottom: 8px;
      font-weight: 600;
    }

    .lobby p {
      color: #94a3b8;
      margin-bottom: 24px;
    }

    .lobby-form {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .lobby-form input {
      padding: 12px 16px;
      background: rgba(15, 23, 42, 0.8);
      border: 2px solid rgba(59, 130, 246, 0.3);
      border-radius: 8px;
      color: #f1f5f9;
      font-size: 16px;
      min-width: 280px;
      transition: border-color 0.2s;
    }

    .lobby-form input:focus {
      outline: none;
      border-color: #3b82f6;
    }

    .lobby-form button {
      padding: 12px 32px;
      background: linear-gradient(135deg, #f59e0b 0%, #ec8c1f 100%);
      border: none;
      border-radius: 8px;
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      font-size: 16px;
    }

    .lobby-form button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(245, 158, 11, 0.3);
    }

    .lobby-status {
      color: #94a3b8;
      font-size: 14px;
      margin-top: 16px;
    }

    /* Writing Phase */
    .writing-container {
      background: rgba(30, 41, 59, 0.6);
      -webkit-backdrop-filter: blur(10px);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(59, 130, 246, 0.2);
      border-radius: 16px;
      padding: 40px;
    }

    .job-title {
      text-align: center;
      margin-bottom: 32px;
    }

    .job-title-badge {
      display: inline-block;
      background: rgba(245, 158, 11, 0.1);
      border: 2px solid #f59e0b;
      border-radius: 12px;
      padding: 16px 24px;
      margin-bottom: 16px;
    }

    .job-title-badge p {
      font-size: 32px;
      margin: 0 0 8px 0;
    }

    .job-title-badge .label {
      color: #94a3b8;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .job-title-text {
      font-size: 20px;
      color: #f1f5f9;
      margin-top: 8px;
    }

    .timer-section {
      text-align: center;
      margin-bottom: 32px;
    }

    .timer-display {
      font-size: 64px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      letter-spacing: 2px;
      margin-bottom: 12px;
    }

    .timer-display.ok {
      color: #10b981;
    }

    .timer-display.warning {
      color: #f59e0b;
      animation: pulse 1s infinite;
    }

    .timer-display.danger {
      color: #ef4444;
      animation: pulse 0.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    .timer-label {
      color: #94a3b8;
      font-size: 14px;
    }

    .instruction {
      background: rgba(59, 130, 246, 0.1);
      border-left: 4px solid #3b82f6;
      padding: 16px;
      border-radius: 8px;
      margin-bottom: 24px;
      color: #cbd5e1;
      font-size: 14px;
      line-height: 1.6;
    }

    textarea {
      width: 100%;
      height: 280px;
      padding: 16px;
      background: rgba(15, 23, 42, 0.8);
      border: 2px solid rgba(59, 130, 246, 0.3);
      border-radius: 8px;
      color: #f1f5f9;
      font-family: inherit;
      font-size: 14px;
      resize: vertical;
      margin-bottom: 20px;
      transition: border-color 0.2s;
    }

    textarea:focus {
      outline: none;
      border-color: #3b82f6;
    }

    textarea:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .submit-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      border: none;
      border-radius: 8px;
      color: white;
      font-weight: 600;
      font-size: 16px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .submit-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(16, 185, 129, 0.3);
    }

    .submit-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .status-message {
      margin-top: 16px;
      padding: 12px;
      border-radius: 8px;
      font-size: 14px;
      text-align: center;
    }

    .status-message.success {
      background: rgba(16, 185, 129, 0.1);
      color: #10b981;
    }

    .status-message.waiting {
      background: rgba(94, 109, 159, 0.1);
      color: #94a3b8;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">🧵</div>
      <h1>Resume Battle</h1>
      <p>Viết CV cho vị trí "Nhân Viên May" • 3 phút</p>
    </div>

    <!-- Lobby Section -->
    <div class="section active" id="lobbySection">
      <div class="lobby">
        <h2>Chào bạn! 👋</h2>
        <p>Nhập MSSV để bắt đầu</p>
        <div class="lobby-form">
          <input type="text" id="mssvInput" placeholder="MSSV của bạn" maxlength="20">
          <button type="button" onclick="joinGame()">Bắt Đầu</button>
        </div>
        <div class="lobby-status" id="lobbyStatus">Chờ xác nhận...</div>
      </div>
    </div>

    <!-- Writing Section -->
    <div class="section" id="writingSection">
      <div class="writing-container">
        <div class="job-title">
          <div class="job-title-badge">
            <p>📝</p>
            <span class="label">Vị trí tuyển dụng</span>
            <p class="job-title-text">Nhân Viên May</p>
          </div>
        </div>

        <div class="timer-section">
          <div class="timer-display ok" id="timerDisplay">03:00</div>
          <div class="timer-label">Thời gian còn lại</div>
        </div>

        <div class="instruction">
          ✏️ Viết CV của bạn cho vị trí Nhân Viên May. Hãy viết như một ứng viên thực — đừng quên kỹ năng và kinh nghiệm!
        </div>

        <textarea id="resumeText" placeholder="Nhập CV của bạn tại đây..." disabled></textarea>
        <button type="button" class="submit-btn" id="submitBtn" onclick="submitResume()" disabled>Nộp CV</button>
        <div class="status-message waiting" id="writingStatus"></div>
      </div>
    </div>
  </div>

  <script>
    let playerId = crypto.randomUUID();
    let playerMSSV = sessionStorage.getItem("playerMSSV") || "";
    let hasJoined = !!playerMSSV;
    let resumeSubmitted = false;

    const API_BASE = "/api";
    const WRITING_TIME = 180;
    let writingTimeLeft = WRITING_TIME;
    let writingTimerInterval = null;

    function showSection(sectionId) {
      document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
      document.getElementById(sectionId).classList.add("active");
    }

    function updateTimer() {
      const mins = Math.floor(writingTimeLeft / 60);
      const secs = writingTimeLeft % 60;
      const display = `${mins.toString().padStart(2, "0")}:${secs.toString().padStart(2, "0")}`;
      document.getElementById("timerDisplay").textContent = display;

      const timer = document.getElementById("timerDisplay");
      if (writingTimeLeft <= 10) {
        timer.className = "timer-display danger";
      } else if (writingTimeLeft <= 30) {
        timer.className = "timer-display warning";
      } else {
        timer.className = "timer-display ok";
      }
    }

    async function joinGame() {
      const mssvInput = document.getElementById("mssvInput");
      playerMSSV = mssvInput.value.trim();

      if (!playerMSSV) {
        alert("Vui lòng nhập MSSV");
        return;
      }

      try {
        const res = await fetch(`${API_BASE}/join`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ playerId, name: playerMSSV }),
        });

        if (res.ok) {
          sessionStorage.setItem("playerMSSV", playerMSSV);
          hasJoined = true;
          mssvInput.disabled = true;
          document.querySelector(".lobby-form button").disabled = true;
          document.getElementById("lobbyStatus").textContent = `✅ Đã tham gia: ${playerMSSV}`;
          showWriting();
        } else {
          alert("Lỗi tham gia game");
        }
      } catch (err) {
        alert(`Lỗi: ${err.message}`);
      }
    }

    function showWriting() {
      showSection("writingSection");
      document.getElementById("resumeText").disabled = false;
      document.getElementById("submitBtn").disabled = false;
      document.getElementById("writingStatus").textContent = "Bạn có 3 phút để viết CV";
      startWritingTimer();
    }

    function startWritingTimer() {
      writingTimeLeft = WRITING_TIME;
      updateTimer();

      if (writingTimerInterval) clearInterval(writingTimerInterval);

      writingTimerInterval = setInterval(() => {
        writingTimeLeft--;
        updateTimer();

        if (writingTimeLeft <= 0) {
          clearInterval(writingTimerInterval);
          document.getElementById("resumeText").disabled = true;
          document.getElementById("submitBtn").disabled = true;
          document.getElementById("writingStatus").textContent = "⏰ Hết giờ! Chờ mọi người...";
          document.getElementById("writingStatus").className = "status-message waiting";
        }
      }, 1000);
    }

    async function submitResume() {
      const resumeText = document.getElementById("resumeText").value.trim();

      if (!resumeText) {
        alert("Vui lòng viết CV");
        return;
      }

      if (resumeSubmitted) return;

      clearInterval(writingTimerInterval);
      const btn = document.getElementById("submitBtn");
      btn.disabled = true;
      btn.textContent = "Đang nộp...";

      try {
        const res = await fetch(`${API_BASE}/resume/submit`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ playerId, text: resumeText }),
        });

        if (res.ok) {
          resumeSubmitted = true;
          btn.textContent = "✅ Đã nộp";
          document.getElementById("writingStatus").textContent = "✅ CV của bạn đã được lưu. Chờ mọi người hoàn thành...";
          document.getElementById("writingStatus").className = "status-message success";
          document.getElementById("resumeText").disabled = true;
        } else {
          btn.disabled = false;
          btn.textContent = "Nộp CV";
          alert("Lỗi nộp CV");
        }
      } catch (err) {
        btn.disabled = false;
        btn.textContent = "Nộp CV";
        alert(`Lỗi: ${err.message}`);
      }
    }

    window.addEventListener("load", () => {
      if (hasJoined) {
        showWriting();
      }
    });
  </script>
</body>
</html>
