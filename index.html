<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Tuyển Dụng — Trò Chơi Tương Tác</title>
  <style>
    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --accent: #3b82f6;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --text: #f1f5f9;
      --muted: #94a3b8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    .container {
      max-width: 1024px;
      margin: 0 auto;
      padding: 20px;
    }

    .header {
      text-align: center;
      margin-bottom: 40px;
    }

    .header h1 {
      font-size: 32px;
      font-weight: bold;
      margin: 0 0 8px 0;
    }

    .header p {
      color: var(--muted);
      margin: 0;
    }

    .section {
      display: none;
      padding: 40px;
      background: var(--surface);
      border-radius: 12px;
      min-height: 400px;
      animation: fadeIn 0.3s ease;
    }

    .section.active {
      display: block;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Lobby */
    .lobby {
      text-align: center;
    }

    .lobby-form {
      display: flex;
      gap: 12px;
      margin-top: 20px;
      justify-content: center;
    }

    .lobby-form input {
      padding: 12px 16px;
      font-size: 16px;
      border: 1px solid var(--muted);
      border-radius: 8px;
      background: var(--bg);
      color: var(--text);
      min-width: 300px;
    }

    .lobby-form button {
      padding: 12px 24px;
      font-size: 16px;
      font-weight: bold;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .lobby-form button:hover {
      background: #2563eb;
    }

    .status {
      margin-top: 20px;
      padding: 12px;
      background: var(--bg);
      border-radius: 8px;
      color: var(--muted);
    }

    /* Writing Phase */
    .writing {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .countdown {
      font-size: 24px;
      font-weight: bold;
      color: var(--warning);
      text-align: center;
    }

    .job-title {
      font-size: 20px;
      font-weight: bold;
      padding: 16px;
      background: var(--bg);
      border-radius: 8px;
      border-left: 4px solid var(--accent);
    }

    textarea {
      padding: 16px;
      font-size: 16px;
      border: 1px solid var(--muted);
      border-radius: 8px;
      background: var(--bg);
      color: var(--text);
      font-family: inherit;
      resize: vertical;
      min-height: 250px;
    }

    .submit-btn {
      padding: 12px 24px;
      font-size: 16px;
      font-weight: bold;
      background: var(--success);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .submit-btn:hover:not(:disabled) {
      background: #059669;
    }

    .submit-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Voting Phase */
    .voting {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .card {
      background: var(--bg);
      border: 2px solid var(--accent);
      border-radius: 12px;
      padding: 30px;
      max-width: 600px;
      width: 100%;
      min-height: 300px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(20px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .card-job {
      font-size: 14px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .card-text {
      flex: 1;
      font-size: 16px;
      line-height: 1.8;
      white-space: pre-wrap;
      overflow-y: auto;
      max-height: 350px;
    }

    .card-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
    }

    .btn-hire, .btn-reject {
      padding: 12px 32px;
      font-size: 16px;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      flex: 1;
    }

    .btn-hire {
      background: var(--success);
      color: white;
    }

    .btn-hire:hover {
      background: #059669;
      transform: scale(1.05);
    }

    .btn-reject {
      background: var(--danger);
      color: white;
    }

    .btn-reject:hover {
      background: #dc2626;
      transform: scale(1.05);
    }

    .voting-done {
      text-align: center;
      padding: 40px 20px;
    }

    .voting-done h2 {
      font-size: 24px;
      color: var(--success);
    }

    /* Results Phase */
    .results {
      display: flex;
      flex-direction: column;
      gap: 30px;
    }

    .result-group {
      background: var(--bg);
      border-radius: 8px;
      padding: 20px;
      border-left: 4px solid var(--accent);
    }

    .result-label {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 12px;
    }

    .result-rate {
      font-size: 32px;
      font-weight: bold;
      color: var(--accent);
      margin-bottom: 8px;
    }

    .result-bar {
      height: 30px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 4px;
      overflow: hidden;
      position: relative;
    }

    .result-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--success));
      width: 0%;
      transition: width 0.6s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 14px;
    }

    .result-stats {
      font-size: 14px;
      color: var(--muted);
      margin-top: 8px;
    }

    .comparison {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-top: 20px;
    }

    @media (max-width: 768px) {
      .comparison {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🤖 AI Tuyển Dụng</h1>
      <p>Trò chơi tương tác: Con người vs AI</p>
    </div>

    <!-- Lobby -->
    <div class="section active" id="lobbySection">
      <h2>Chào mừng!</h2>
      <p>Hãy nhập tên của bạn để bắt đầu:</p>
      <div class="lobby-form">
        <input type="text" id="nameInput" placeholder="Tên của bạn" maxlength="50">
        <button onclick="joinGame()">Tham gia</button>
      </div>
      <div class="status" id="lobbyStatus">Chờ host bắt đầu...</div>
    </div>

    <!-- Writing Phase -->
    <div class="section" id="writingSection">
      <div class="countdown" id="writingCountdown"></div>
      <div class="job-title" id="jobTitleDisplay"></div>
      <label for="resumeText">Viết resume của bạn cho vị trí trên (150-300 từ):</label>
      <textarea id="resumeText" placeholder="Nhập resume của bạn tại đây..."></textarea>
      <button class="submit-btn" id="submitBtn" onclick="submitResume()">Nộp Resume</button>
      <div class="status" id="writingStatus"></div>
    </div>

    <!-- Voting Phase -->
    <div class="section" id="votingSection">
      <div class="countdown" id="votingCountdown"></div>
      <div id="votingContent"></div>
    </div>

    <!-- Results Phase -->
    <div class="section" id="resultsSection">
      <h2>📊 Kết Quả</h2>
      <p>So sánh tỉ lệ Hire giữa bản AI và bản người:</p>
      <div class="comparison">
        <div class="result-group">
          <div class="result-label">🤖 Resume AI</div>
          <div class="result-rate" id="aiRate">0%</div>
          <div class="result-bar">
            <div class="result-fill" id="aiFill" style="width: 0%"></div>
          </div>
          <div class="result-stats" id="aiStats"></div>
        </div>
        <div class="result-group">
          <div class="result-label">👤 Resume Người</div>
          <div class="result-rate" id="humanRate">0%</div>
          <div class="result-bar">
            <div class="result-fill" id="humanFill" style="width: 0%; background: linear-gradient(90deg, var(--warning), var(--danger));"></div>
          </div>
          <div class="result-stats" id="humanStats"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let playerId = localStorage.getItem("playerId");
    if (!playerId) {
      playerId = crypto.randomUUID();
      localStorage.setItem("playerId", playerId);
    }

    let playerName = "";
    let gameState = { phase: "lobby", deadline: null, startedAt: null };
    let jobTitle = "";
    let resumeSubmitted = false;

    const API_BASE = "/api";

    async function joinGame() {
      const nameInput = document.getElementById("nameInput");
      playerName = nameInput.value.trim();

      if (!playerName) {
        alert("Vui lòng nhập tên của bạn");
        return;
      }

      try {
        const res = await fetch(`${API_BASE}/join`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ playerId, name: playerName }),
        });

        if (res.ok) {
          document.getElementById("nameInput").disabled = true;
          document.querySelector(".lobby-form button").disabled = true;
          document.getElementById("lobbyStatus").textContent = `✅ Đã tham gia với tên: ${playerName}`;
          startPolling();
        } else {
          alert("Lỗi tham gia game");
        }
      } catch (err) {
        alert(`Lỗi: ${err.message}`);
      }
    }

    function startPolling() {
      setInterval(pollPhase, 1500);
    }

    async function pollPhase() {
      try {
        const res = await fetch(`${API_BASE}/phase`);
        const data = await res.json();

        gameState = data;

        if (data.phase === "lobby") {
          showSection("lobbySection");
        } else if (data.phase === "writing") {
          showSection("writingSection");
          if (!jobTitle) {
            await assignJobTitle();
          }
          updateCountdown("writingCountdown", data.deadline);
        } else if (data.phase === "voting") {
          showSection("votingSection");
          updateCountdown("votingCountdown", data.deadline);
          loadNextCard();
        } else if (data.phase === "results") {
          showSection("resultsSection");
          loadResults();
        }
      } catch (err) {
        console.error("Poll phase error:", err);
      }
    }

    function showSection(sectionId) {
      document.querySelectorAll(".section").forEach((s) => {
        s.classList.remove("active");
      });
      document.getElementById(sectionId).classList.add("active");
    }

    async function assignJobTitle() {
      try {
        const res = await fetch(`${API_BASE}/resume/assign`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ playerId }),
        });

        const data = await res.json();
        jobTitle = data.jobTitle;
        document.getElementById("jobTitleDisplay").textContent = `📋 Vị trí: ${jobTitle}`;
      } catch (err) {
        alert(`Lỗi gán vị trí: ${err.message}`);
      }
    }

    async function submitResume() {
      const resumeText = document.getElementById("resumeText").value.trim();

      if (!resumeText) {
        alert("Vui lòng viết resume");
        return;
      }

      if (resumeSubmitted) return;

      const btn = document.getElementById("submitBtn");
      btn.disabled = true;
      btn.textContent = "Đang nộp...";

      try {
        const res = await fetch(`${API_BASE}/resume/submit`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ playerId, jobTitle, text: resumeText }),
        });

        if (res.ok) {
          resumeSubmitted = true;
          btn.textContent = "✅ Đã nộp";
          document.getElementById("writingStatus").textContent = "Đã nộp resume. Chờ mọi người...";
          document.getElementById("resumeText").disabled = true;
        } else {
          btn.disabled = false;
          btn.textContent = "Nộp Resume";
          alert("Lỗi nộp resume");
        }
      } catch (err) {
        btn.disabled = false;
        btn.textContent = "Nộp Resume";
        alert(`Lỗi: ${err.message}`);
      }
    }

    async function loadNextCard() {
      try {
        const res = await fetch(`${API_BASE}/vote/next?playerId=${playerId}`);
        const data = await res.json();

        if (data.done) {
          document.getElementById("votingContent").innerHTML = `
            <div class="voting-done">
              <h2>✅ Bạn đã xong!</h2>
              <p>Cảm ơn bạn đã tham gia. Chờ mọi người hoàn thành...</p>
            </div>
          `;
          return;
        }

        const resumeId = data.resumeId;
        const cardHtml = `
          <div class="card">
            <div class="card-job">${data.jobTitle}</div>
            <div class="card-text">${data.text}</div>
            <div class="card-actions">
              <button class="btn-hire" onclick="vote('${resumeId}', 'hire')">✅ Hire</button>
              <button class="btn-reject" onclick="vote('${resumeId}', 'reject')">❌ Reject</button>
            </div>
          </div>
        `;
        document.getElementById("votingContent").innerHTML = cardHtml;
      } catch (err) {
        console.error("Load card error:", err);
      }
    }

    async function vote(resumeId, decision) {
      try {
        const res = await fetch(`${API_BASE}/vote/submit`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ playerId, resumeId, decision }),
        });

        if (res.ok) {
          loadNextCard();
        } else {
          alert("Lỗi vote");
        }
      } catch (err) {
        alert(`Lỗi: ${err.message}`);
      }
    }

    async function loadResults() {
      try {
        const res = await fetch(`${API_BASE}/results`);
        const data = await res.json();

        const aiRate = data.aiTotal > 0 ? data.aiHireRate : 0;
        const humanRate = data.humanTotal > 0 ? data.humanHireRate : 0;

        document.getElementById("aiRate").textContent = `${aiRate}%`;
        document.getElementById("aiFill").style.width = `${aiRate}%`;
        document.getElementById("aiStats").textContent = `${data.aiHire} Hire / ${data.aiReject} Reject (tổng ${data.aiTotal})`;

        document.getElementById("humanRate").textContent = `${humanRate}%`;
        document.getElementById("humanFill").style.width = `${humanRate}%`;
        document.getElementById("humanStats").textContent = `${data.humanHire} Hire / ${data.humanReject} Reject (tổng ${data.humanTotal})`;
      } catch (err) {
        console.error("Load results error:", err);
      }
    }

    function updateCountdown(elementId, deadline) {
      if (!deadline) return;

      const update = () => {
        const now = Date.now();
        const remaining = Math.max(0, deadline - now);
        const seconds = Math.floor(remaining / 1000);
        const minutes = Math.floor(seconds / 60);
        const secs = seconds % 60;

        document.getElementById(elementId).textContent = `⏱️ ${minutes}:${secs.toString().padStart(2, "0")}`;

        if (remaining > 0) {
          setTimeout(update, 100);
        }
      };

      update();
    }

    // Initialize on load
    window.addEventListener("load", () => {
      pollPhase();
    });
  </script>
</body>
</html>
